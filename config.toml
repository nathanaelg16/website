[[menu.main]]
    identifier = "github"
    # name = "GitHub"
    pre = "<i class='fab fa-github fa-lg'></i>"
    url = "https://github.com/nathanaelg16"
    weight = 30

[[menu.main]]
    identifier = "email"
    # name = "Email"
    pre = "<i class='fa fa-envelope fa-lg'></i>"
    url = "mailto:nathanaelg16@gmail.com"
    weight = 40

[[menu.main]]
    identifier = "pgp"
    # name = "PGP Key"
    pre = "<i class='fas fa-key'></i>"
    url = "/pgp"
    weight = 50

[[menu.main]]
    identifier = "cv"
    # name = "CV"
    pre = "<i class='fa fa-file'></i>"
    url = "/cv.pdf"
    weight = 60

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = true
    respectDoNotTrack = true
    useSessionStorage = true
  [privacy.instagram]
    disable = true
    simple = true
  [privacy.twitter]
    disable = false
    enableDNT = true
    simple = true
  [privacy.vimeo]
    disable = true
    enableDNT = false
    simple = false
  [privacy.youtube]
    disable = false
    privacyEnhanced = true
