baseurl = "https://nathanaelgutierrez.com"
title = "Nathanael Gutierrez"
theme = "pulp"
canonifyurls = true
hasCJKLanguage = true
enableEmoji = true
# pygmentsCodefences = true
# pygmentsUseClasses = true
# googleAnalytics = "{your tracking code}"

[markup.goldmark.renderer]
    unsafe = true # Allow user HTML tags

[params]
    author = "Nathanael Gutierrez"
    avatar = "avatar.png"
    # avatarDescription = "My avatar description"
    favicon = "favicon.ico"
    description = """
        Hi! I'm a PhD student at the Georgia Institute of Technology. My research interests are at the intersection of machine learning, neuroscience, and cognitive science.
    """
    publicationYear = "2022"
    # listPageDateFormat = "January, 2006" # See https://gohugo.io/functions/format/
    # singlePageDateFormat = "January 2, 2006"
    #custom_css = ["/css/custom.css"]
    #custom_js = ["/js/matomo.js"]

# Make sure setting a following option for search bar to work
[outputs]
    section = ["JSON", "HTML"]
    term = ["JSON", "HTML"]

